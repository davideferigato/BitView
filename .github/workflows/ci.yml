name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check level.dat exists
        run: |
          if [ -f "00-99_Display/world/BitView_00-99_Display/level.dat" ]; then
            echo "✅ level.dat found"
          else
            echo "❌ level.dat not found"
            exit 1
          fi

      - name: Debug list files
        run: |
          pwd
          ls -la "00-99_Display/circuit docs/"
          cat "00-99_Display/circuit docs/truth table.csv" | head -5

      - name: Validate truth table CSV
        run: |
          cat > /tmp/validate_csv.py << 'EOF'
          import csv, sys
          path = "00-99_Display/circuit docs/truth table.csv"
          try:
              with open(path, 'r') as f:
                  reader = csv.reader(f, delimiter=';')
                  header = next(reader)
                  if len(header) < 11:
                      print(f"❌ Expected at least 11 columns, got {len(header)}")
                      sys.exit(1)
                  rows = list(reader)
                  if len(rows) < 16:
                      print(f"❌ Expected at least 16 data rows, got {len(rows)}")
                      sys.exit(1)
                  # Check segment values (columns 4 to 10, indices 4..10)
                  for i, row in enumerate(rows):
                      for col in range(4, 11):
                          val = row[col].strip().upper()
                          if val not in ('0', '1', 'X'):
                              print(f"❌ Row {i+2}, column {col+1}: invalid value '{val}'")
                              sys.exit(1)
                  print(f"✅ CSV valid: {len(rows)} rows, {len(header)} columns (delimiter ';')")
          except Exception as e:
              print(f"❌ Error reading CSV: {e}")
              sys.exit(1)
          EOF
          python3 /tmp/validate_csv.py

      - name: Check AND to OR-NOT.md exists

      - name: Validate world files (advanced)
        run: |
          python tools/validate_world.py

        run: |
          if [ -f "00-99_Display/circuit docs/AND to OR-NOT.md" ]; then
            echo "✅ Documentation found"
          else
            echo "❌ Documentation missing"
            exit 1
          fi

      - name: Check region files (warnings only)
        run: |
          files=(00-99_Display/world/BitView_00-99_Display/region/*.mca)
          if [ "${files[0]}" = "00-99_Display/world/BitView_00-99_Display/region/*.mca" ]; then
            echo "⚠️ No .mca files found in region folder"
          else
            for file in "${files[@]}"; do
              if [ ! -s "$file" ]; then
                echo "⚠️ Warning: $file is empty (may be fine)"
              fi
            done
          fi