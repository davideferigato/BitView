name: CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check level.dat exists
        run: |
          if [ -f "00-99_Display/world/BitView_00-99_Display/level.dat" ]; then
            echo "✅ level.dat found"
          else
            echo "❌ level.dat not found"
            exit 1
          fi

      - name: Debug - list circuit docs folder
        run: |
          ls -la "00-99_Display/circuit docs/"

      - name: Validate truth table CSV
        run: |
          python3 << 'EOF'
import csv, sys
path = "00-99_Display/circuit docs/truth table.csv"
try:
    with open(path, 'r') as f:
        reader = csv.reader(f)
        header = next(reader)
        rows = list(reader)
        if len(rows) < 16:
            print(f"❌ Expected at least 16 data rows, got {len(rows)}")
            sys.exit(1)
        if len(header) != 9:
            print(f"❌ Expected 9 columns, got {len(header)}")
            sys.exit(1)
        print(f"✅ CSV valid: {len(rows)} rows, {len(header)} columns")
except Exception as e:
    print(f"❌ Error reading CSV: {e}")
    sys.exit(1)
EOF

      - name: Check AND to OR-NOT.md exists
        run: |
          if [ -f "00-99_Display/circuit docs/AND to OR-NOT.md" ]; then
            echo "✅ Documentation found"
          else
            echo "❌ Documentation missing"
            exit 1
          fi

      - name: Check region files (warnings only)
        run: |
          for file in 00-99_Display/world/BitView_00-99_Display/region/*.mca; do
            if [ ! -s "$file" ]; then
              echo "⚠️ Warning: $file is empty (may be fine)"
            fi
          done